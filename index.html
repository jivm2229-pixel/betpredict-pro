<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BetPredict Pro</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:white;
}

header{
    background:#7c3aed;
    padding:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.container{
    padding:20px;
}

.card{
    background:#1e293b;
    border-radius:15px;
    padding:20px;
    margin-bottom:15px;
}

button{
    width:100%;
    background:#7c3aed;
    color:white;
    border:none;
    padding:15px;
    border-radius:10px;
    font-size:18px;
}

select{
    width:100%;
    padding:12px;
    border-radius:10px;
    margin-bottom:15px;
}

.resultado{
    display:none;
}

.probabilidad{
    margin:10px 0;
}

.barra{
    height:20px;
    background:#7c3aed;
    border-radius:10px;
}

</style>
</head>

<body>

<header>
BetPredict Pro ⚽
</header>

<div class="container">

<div class="card">

<h3>Selecciona un partido</h3>

<select id="partido">
<option>Portugal vs RD Congo</option>
<option>Inglaterra vs Croacia</option>
<option>Colombia vs Uzbekistán</option>
</select>

<button onclick="analizar()">
Analizar Partido
</button>

</div>

<div class="card resultado" id="resultado">

<h3>Escenarios Probables</h3>

<p>Victoria Local</p>
<div class="barra" style="width:74%"></div>

<p>Over 1.5 Goles</p>
<div class="barra" style="width:88%"></div>

<p>Over 2.5 Goles</p>
<div class="barra" style="width:66%"></div>

<p>Ambos Anotan</p>
<div class="barra" style="width:42%"></div>

</div>

</div>

<script>


function analizar(){

let partido = document.getElementById("partido").value;

let html = "";

if(partido === "Portugal vs RD Congo"){

html = `
<h3>Portugal vs RD Congo</h3>

<p>Victoria Portugal (78%)</p>
<div class="barra" style="width:78%"></div>

<p>Over 1.5 goles (89%)</p>
<div class="barra" style="width:89%"></div>

<p>Over 2.5 goles (67%)</p>
<div class="barra" style="width:67%"></div>

<p>Ambos anotan (42%)</p>
<div class="barra" style="width:42%"></div>

<p>Marcador probable: 3-0</p>
`;

}

if(partido === "Inglaterra vs Croacia"){

html = `
<h3>Inglaterra vs Croacia</h3>

<p>Victoria Inglaterra (54%)</p>
<div class="barra" style="width:54%"></div>

<p>Over 1.5 goles (71%)</p>
<div class="barra" style="width:71%"></div>

<p>Over 2.5 goles (48%)</p>
<div class="barra" style="width:48%"></div>

<p>Ambos anotan (46%)</p>
<div class="barra" style="width:46%"></div>

<p>Marcador probable: 2-0</p>
`;

}

if(partido === "Colombia vs Uzbekistán"){

html = `
<h3>Colombia vs Uzbekistán</h3>

<p>Victoria Colombia (74%)</p>
<div class="barra" style="width:74%"></div>

<p>Over 1.5 goles (83%)</p>
<div class="barra" style="width:83%"></div>

<p>Over 2.5 goles (61%)</p>
<div class="barra" style="width:61%"></div>

<p>Ambos anotan (38%)</p>
<div class="barra" style="width:38%"></div>

<p>Marcador probable: 2-0</p>
`;

}

document.getElementById("resultado").innerHTML = html;
document.getElementById("resultado").style.display = "block";

}
</script>

</body>
</html>
